# ??Spring??????ivos
spring.application.name=ivos

# ???????????8080
server.port=8080

# ??????URL??????MySQL???????????/????????UTF-8
spring.datasource.url=jdbc:mysql://localhost:3306/ivos?serverTimezone=Asia/Shanghai&characterEncoding=utf8
# ??????????
spring.datasource.username=root
spring.datasource.password=123456

# ??MyBatis???????
mybatis.mapper-locations=classpath:mappers/*.xml
# ??MyBatis??????????????????????? parent_id => parentId
mybatis.configuration.map-underscore-to-camel-case=true

# ???????????????warn
logging.level.root=warn
# ?????com.xfs??????debug???????????
logging.level.com.xfs=debug

# ??Knife4j????
knife4j.enable=true
# ??Springdoc?????:??API???????????
springdoc.group-configs[0].group=default
# ????????????????????????????API???
springdoc.group-configs[0].paths-to-match=/**
# ????????????????API???????
springdoc.group-configs[0].packages-to-scan=com.xfs

# swrs?????????:?? resources/static
spring.web.resources.static-locations=file:d:/files,classpath:static
# ssmm:???????????
spring.servlet.multipart.max-file-size=100MB
# ssmm:???????????[????]
spring.servlet.multipart.max-request-size=500MB